name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: true
        default: 'v0.0.2'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions: write-all
    strategy:
      matrix:
        include:
          # macOS ARM (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ciphera-cli
            asset_name: ciphera-cli-macos-arm64
            electron_arch: arm64
            electron_cmd: electron:build:mac
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ciphera-cli
            asset_name: ciphera-cli-linux-amd64
            electron_arch: x64
            electron_cmd: electron:build:linux

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false         # Has limits. Not needed when bb is archived
          fetch-depth: 0     # Optional: full history if needed

      - name: Setup Rust
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0
          rustup target add ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./payy -> target"
          key: ${{ matrix.target }}

      - name: Install Protobuf (macOS/Linux)
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install protobuf
          elif [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          fi
          protoc --version
        shell: bash

      - name: Build
        working-directory: payy
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binaries (macOS/Linux)
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        working-directory: payy
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          mkdir -p target/release
          # TODO: fix quick patch
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/release/${{ matrix.artifact_name }}
          chmod +x ${{ matrix.asset_name }}
          gh release create ${{ github.ref_name }} -R zerosats/zerosats || true
          gh release upload ${{ github.ref_name }} ${{ matrix.asset_name }} -R zerosats/zerosats --clobber

        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: payy/web/package-lock.json

      - name: Install npm dependencies
        working-directory: payy/web
        run: npm ci

      - name: Build Electron app (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          USE_HARD_LINKS: false
        working-directory: payy/web
        run: |
          tar -xvzf binaries/darwin/barretenberg-arm64-darwin.tar.gz -C binaries/darwin 
          chmod +x binaries/darwin/bb
          npm run electron:build:mac -- --${{ matrix.electron_arch }} --publish never
          gh release upload ${{ github.ref_name }} release/*.dmg -R zerosats/zerosats --clobber

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          USE_HARD_LINKS: false
        working-directory: payy/web
        run: |
          tar -xvzf binaries/linux64/barretenberg-amd64-linux.tar.gz -C binaries/linux64          
          chmod +x binaries/linux64/bb
          npm run electron:build:linux -- --publish never
          gh release upload ${{ github.ref_name }} release/*.AppImage -R zerosats/zerosats --clobber

      - name: Publish Electron app
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        working-directory: payy/web
        run: |
          gh release create ${{ github.ref_name }} -R zerosats/ciphera-wallet || true
          # gh release upload ${{ github.ref_name }} release/*.dmg release/*.AppImage -R zerosats/ciphera-wallet --clobber
          # gh release upload ${{ github.ref_name }} binaries/darwin/barretenberg-arm64-darwin.tar.gz -R zerosats/ciphera-wallet --clobber


  test-dmg:
    runs-on: macos-latest  # Free for public repos
    needs: [ build ]
    steps:
      - name: Download DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
             --repo zerosats/zerosats \
             --pattern "*arm64.dmg"
          
          ls -la *.dmg
          file *.dmg

      - name: Mount and test
        run: |
          hdiutil attach Ciphera-0.1.0-arm64.dmg
          
          # Check binaries exist and are executable
          ls -la "/Volumes/Ciphera 0.1.0-arm64/Ciphera.app/Contents/Resources/bin/"
          file "/Volumes/Ciphera 0.1.0-arm64/Ciphera.app/Contents/Resources/bin/bb"
          file "/Volumes/Ciphera 0.1.0-arm64/Ciphera.app/Contents/Resources/bin/ciphera-cli"
          
          # Test CLI
          "/Volumes/Ciphera 0.1.0-arm64/Ciphera.app/Contents/Resources/bin/ciphera-cli" create
          # "/Volumes/Ciphera 0.1.0-arm64/Ciphera.app/Contents/Resources/bin/bb" --version
          
          hdiutil detach "/Volumes/Ciphera 0.1.0-arm64"