name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          # macOS ARM (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ciphera-cli
            asset_name: ciphera-cli-macos-arm64
            electron_arch: arm64
            electron_cmd: electron:build:mac
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ciphera-cli
            asset_name: ciphera-cli-linux-amd64
            electron_arch: x64
            electron_cmd: electron:build:linux

    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true          # Add this line
          fetch-depth: 0     # Optional: full history if needed

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install protoc (macOS/Linux)
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install protobuf
          elif [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          fi
          protoc --version
        shell: bash

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        working-directory: ./payy
        run: cargo build --release --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename and prepare binary (macOS/Linux)
        working-directory: ./payy
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}
        shell: bash

      - name: Upload CLI to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # === Electron App Build ===

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: payy/web/package-lock.json

      - name: Install npm dependencies
        working-directory: ./payy/web
        run: npm ci

      - name: Clean Electron release directory (macOS/Linux)
        working-directory: ./payy
        run: rm -rf web/release
        shell: bash

      - name: Copy CLI binary for Electron packaging (macOS/Linux)
        working-directory: ./payy
        run: |
          mkdir -p target/release
          rm -f target/release/${{ matrix.artifact_name }}
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} payy/target/release/${{ matrix.artifact_name }}
          chmod +x target/release/${{ matrix.artifact_name }}
        shell: bash

      - name: Build Electron app (macOS)
        if: runner.os == 'macOS'
        working-directory: web
        run: |
          tar -xvzf $GITHUB_WORKSPACE/payy/web/binaries/darwin/barretenberg-arm64-darwin.tar.gz -C $GITHUB_WORKSPACE/payy/web/binaries/darwin 
          chmod +x $GITHUB_WORKSPACE/payy/web/binaries/darwin/bb
          npm run electron:build:mac -- --${{ matrix.electron_arch }} --publish never
        env:
          USE_HARD_LINKS: false

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        working-directory: ./payy/web
        run: |
          tar -xvzf $GITHUB_WORKSPACE/payy/web/binaries/linux64/barretenberg-amd64-linux.tar.gz -C $GITHUB_WORKSPACE/payy/web/binaries/linux64          
          chmod +x $GITHUB_WORKSPACE/payy/web/binaries/linux64/bb
          npm run electron:build:linux -- --publish never
        env:
          USE_HARD_LINKS: false

      - name: Upload Electron app to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            payy/web/release/*.dmg
            payy/web/release/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

