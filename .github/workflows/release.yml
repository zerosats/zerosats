name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          # macOS ARM (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ciphera-cli
            asset_name: ciphera-cli-macos-arm64
            electron_arch: arm64
            electron_cmd: electron:build:mac
          # Linux
          #- os: ubuntu-latest
          #  target: x86_64-unknown-linux-gnu
          #  artifact_name: ciphera-cli
          #  asset_name: ciphera-cli-linux-amd64
          #  electron_arch: x64
          #  electron_cmd: electron:build:linux

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false         # Has limits. Was introduced initially for bb binaries
          fetch-depth: 0     # Optional: full history if needed

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc (macOS/Linux)
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install protobuf
          elif [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          fi
          protoc --version
        shell: bash

      - name: Build
        working-directory: ./payy
        run: cargo build --release --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename and prepare binary (macOS/Linux)
        working-directory: ./payy
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}
        shell: bash

      - name: Upload CLI to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: payy/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # === Electron App Build ===

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: payy/web/package-lock.json

      - name: Install npm dependencies
        working-directory: ./payy/web
        run: npm ci

      - name: Build Electron app (macOS)
        if: runner.os == 'macOS'
        working-directory: ./payy/web
        run: |
          tar -xvzf binaries/darwin/barretenberg-arm64-darwin.tar.gz -C binaries/darwin 
          chmod +x binaries/darwin/bb
          npm run electron:build:mac -- --${{ matrix.electron_arch }} --publish never
        env:
          USE_HARD_LINKS: false

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        working-directory: ./payy/web
        run: |
          tar -xvzf binaries/linux64/barretenberg-amd64-linux.tar.gz -C binaries/linux64          
          chmod +x binaries/linux64/bb
          npm run electron:build:linux -- --publish never
        env:
          USE_HARD_LINKS: false

      # Source https://theawesomegarage.com/blog/automating-relases-with-github-actions
      - name: Get commit messages with SHAs
        run: |
          if [[ "$SQUASH_MERGE" == "true" ]]; then
            # For squash merges, just fetch the single PR commit
            response=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr_meta.outputs.number }}/commits")

            echo "$response" \
              | python3 -c "import sys, json; d = json.load(sys.stdin)[0]; print(f\"{d['commit']['message']} ({d['sha'][:7]})\")" \
              > commits.txt
          else
            # For regular merges, exclude lines containing "Merge pull request"
            git log --pretty=format:"%s (%h)" ${{ github.event.before }}..${{ github.sha }} \
              | grep -v "Merge pull request" \
              > commits.txt
          fi

      - name: Build release notes file
        run: |
          # Create a file for the release notes.
          # Title from the PR:
          echo "## ${{ steps.pr_meta.outputs.pr_title }}" > release-notes.md

          # Conditionally add a "Summary" section if there's a PR body.
          if [[ -n "${{ steps.pr_meta.outputs.pr_body }}" ]]; then
            echo "" >> release-notes.md
            echo "### Summary" >> release-notes.md
            echo "${{ steps.pr_meta.outputs.pr_body }}" >> release-notes.md
          fi

          echo "" >> release-notes.md
          echo "### Changes" >> release-notes.md
          awk '{print "• " $0}' commits.txt >> release-notes.md

      - name: Upload Electron app to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Release ${{ github.ref_name }}"
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            payy/web/release/*.dmg
            payy/web/release/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Electron app
        env:
          GITHUB_TOKEN: "${{ secrets.CIPHERA_WALLET_SECRET }}"
        working-directory: ./payy/web
        run: |
          gh release create ${{ github.ref_name }} -R zerosats/ciphera-wallet -F release-notes.md || true
          gh release upload ${{ github.ref_name }} release/*.dmg release/*.AppImage -R zerosats/ciphera-wallet --clobber
