name: Release Binaries

on:
  push:
    #tags:
    #  - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions: write-all
    strategy:
      matrix:
        include:
          # macOS ARM (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ciphera-cli
            asset_name: ciphera-cli-macos-arm64
            electron_arch: arm64
            electron_cmd: electron:build:mac
          # Linux
          #- os: ubuntu-latest
          #  target: x86_64-unknown-linux-gnu
          #  artifact_name: ciphera-cli
          #  asset_name: ciphera-cli-linux-amd64
          #  electron_arch: x64
          #  electron_cmd: electron:build:linux

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false         # Has limits. Was introduced initially for bb binaries
          fetch-depth: 0     # Optional: full history if needed

      - name: Publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ./payy/web
        run: |
          gh release create v0 -R zerosats/ciphera-wallet || true
          # gh release upload ${{ github.ref_name }} binaries/darwin/barretenberg-arm64-darwin.tar.gz -R zerosats/ciphera-wallet --clobber

      - name: Setup Rust
        working-directory: ./payy
        run: | 
          rustup toolchain install 1.88.0
          rustup target add ${{ matrix.target }}

      - name: Install Protobuf (macOS/Linux)
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install protobuf
          elif [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          fi
          protoc --version
        shell: bash

      - name: Build
        working-directory: ./payy
        run: cargo build --release --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename and prepare binary (macOS/Linux)
        working-directory: ./payy
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}
          gh release create ${{ github.ref_name }} -R zerosats/zerosats || true
          gh release upload ${{ github.ref_name }} ${{ matrix.asset_name }} -R zerosats/zerosats --clobber

        shell: bash

      # === Electron App Build ===

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: payy/web/package-lock.json

      - name: Install npm dependencies
        working-directory: ./payy/web
        run: npm ci

      - name: Build Electron app (macOS)
        if: runner.os == 'macOS'
        working-directory: ./payy/web
        run: |
          tar -xvzf binaries/darwin/barretenberg-arm64-darwin.tar.gz -C binaries/darwin 
          chmod +x binaries/darwin/bb
          npm run electron:build:mac -- --${{ matrix.electron_arch }} --publish never
        env:
          USE_HARD_LINKS: false

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        working-directory: ./payy/web
        run: |
          tar -xvzf binaries/linux64/barretenberg-amd64-linux.tar.gz -C binaries/linux64          
          chmod +x binaries/linux64/bb
          npm run electron:build:linux -- --publish never
        env:
          USE_HARD_LINKS: false

      # Source https://theawesomegarage.com/blog/automating-relases-with-github-actions
#      - name: Generate release notes file
#        run: |
#          git log --pretty=format:"%s (%h)" --merges --first-parent > commits.txt
#
#          # Create a file for the release notes.
#          # Title from the PR:
#          echo "## ${{ steps.pr_meta.outputs.pr_title }}" > release-notes.md
#
#          # Conditionally add a "Summary" section if there's a PR body.
#          if [[ -n "${{ steps.pr_meta.outputs.pr_body }}" ]]; then
#            echo "" >> release-notes.md
#            echo "### Summary" >> release-notes.md
#            echo "${{ steps.pr_meta.outputs.pr_body }}" >> release-notes.md
#          fi
#
#          echo "" >> release-notes.md
#          echo "### Changes" >> release-notes.md
#          awk '{print "• " $0}' commits.txt >> release-notes.md

      - name: Upload Electron app to Release
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        working-directory: ./payy/web
        run: |
          gh release create ${{ github.ref_name }} -R zerosats/zerosats || true
          gh release upload ${{ github.ref_name }} release/*.dmg release/*.AppImage -R zerosats/zerosats --clobber

      - name: Publish Electron app
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        working-directory: ./payy/web
        run: |
          gh release create ${{ github.ref_name }} -R zerosats/ciphera-wallet || true
          gh release upload ${{ github.ref_name }} release/*.dmg release/*.AppImage -R zerosats/ciphera-wallet --clobber
