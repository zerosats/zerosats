name: Push check

on:
  push:

permissions:
  contents: write

jobs:
  test-dmg:
    runs-on: macos-latest  # Free for public repos
    steps:
      #- uses: actions/checkout@v3
      #  with:
      #    lfs: false         # Has limits. Was introduced initially for bb binaries
      #    fetch-depth: 0     # Optional: full history if needed
      - name: Publish TEST
        env:
          GH_TOKEN: "${{ secrets.CIPHERA_PAT }}"
        # working-directory: payy/web # re-enable on activating checkout
        run: |
          gh release create TEST -R zerosats/ciphera-wallet --title "Version ${{ github.ref_name }}"
          touch test.test
          gh release upload TEST test.test -R zerosats/ciphera-wallet --clobber
